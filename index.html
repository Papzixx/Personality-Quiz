<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personality Archetype Quiz</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="card">

<!-- START SCREEN -->

<div id="start-screen">

<h1 class="title">Find Your Personality Archetype</h1>

<p class="subtitle">
Are you a mysterious Black Cat, loyal Golden Retriever,
confident Doberman, or chaotic Orange Cat?
</p>

<div class="types">

<div class="type">🐈‍⬛<span>Black Cat</span></div>
<div class="type">🐕<span>Golden Retriever</span></div>
<div class="type">🐕‍🦺<span>Doberman</span></div>
<div class="type">🐈<span>Orange Cat</span></div>

</div>

<button id="start-btn">Start Quiz</button>

</div>


<!-- QUIZ -->

<div id="quiz" class="hidden">

<div class="progress-container">
<div id="progress-bar"></div>
</div>

<div id="progress-text"></div>

<h2 id="question"></h2>

<div id="answers"></div>

</div>


<!-- RESULT -->

<div id="result" class="hidden">

<div class="result-card">

<h2 id="personality-title"></h2>

<p id="personality-description"></p>

<div class="compatibility-box">
<p class="compat-label">💞 Best Match</p>
<h3 id="compat-title"></h3>
<p id="compat-description"></p>
</div>

<button id="share-btn">Share Result</button>

<button id="restart">Restart Quiz</button>

</div>

</div>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
